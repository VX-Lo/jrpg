# Phase 6 — economy goods. Base identity is FIXED authored content, not
# generated (CLAUDE.md §6.1) — only the regional-adjective flavor layer
# uses the grammar engine. 16 categories (8 raw, 8 processed), 6 goods
# each = 96 total. Fixture-scale, not the design doc's full ~200-good
# catalog (same "prove the mechanism" precedent as Phase 2's 4 kernels /
# Phase 4.5's 81 chunks) — see CLAUDE.md Decisions log.
#
# base_price is a simple ascending-by-tier pattern per category
# (raw: 5,10,15,20,25,30; processed: 15,27,39,51,63,75, roughly a
# 2.5-3x value-add over the corresponding raw tier) — illustrative,
# UNCALIBRATED, not a balance pass.

