# --- additional non-POI variants ---------------------------------------
#
# SIZING: an interior is INTERIOR_GRID_SIZE^2 = 16 rooms, no-repeat is a
# hard rule within one interior, and a fully-constrained room admits one
# open-edge pattern. Straights are the pressure point (a spanning tree over
# a small grid produces long runs of them), so they get the most bases.
# Making the poi-slot match symmetric — a room with no node may not take a
# poi chunk — halved the non-POI pool, which is what exposed this.

