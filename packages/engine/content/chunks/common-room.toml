# Room-scale chunks — scale "room", biome "common".
#
# The CLOSEST zoom: inn rooms, dungeon rooms. Deliberately the second scale
# proven rather than `medium`, because it is architecturally the furthest
# from `far` — smallest tile size (ROOM_CHUNK_SIZE 8, not 16), different
# POI density, different purpose. If one stitching engine serves both
# extremes, `medium` sitting between them is materially lower-risk.
#
# AUTHORING CONVENTION AT THIS SCALE: open edges are walkable at offsets
# 3-4 (the middle TWO tiles of 8), not 6-9. The convention is per-scale
# because it is just "the middle of the edge" — nothing in the stitcher
# assumes any particular profile, it only requires that two chunks meeting
# at a seam declare the same offsets.
#
# Glyphs: "." walkable, "#" impassable, "P" walkable + hosts a logical node.

# --- 4 open edges -----------------------------------------------------

[[chunks]]
id = "room:corridor-cross"
biome_tag = "common"
scale = "room"
poi_slot = false
rows = [
  "###..###",
  "###..###",
  "###..###",
  ".#......",
  "........",
  "###..###",
  "###..###",
  "###..###",
]
connectors = { north = { kind = "open" }, east = { kind = "open" }, south = { kind = "open" }, west = { kind = "open" } }

