# Fixture wilderness chunks — biome "common".
#
# The structural backbone of the fixture library: every open-edge pattern
# (0/1/2-straight/2-bend/3/4 open edges) is represented, so the assembler
# can satisfy any required through-path by rotating one of these. Regions
# whose kernel has no dedicated biome pool fall back to this one.
#
# AUTHORING CONVENTION: every `open` edge is walkable at offsets 6-9 (the
# middle four tiles). A single shared profile means any open edge matches
# any other open edge, which is what keeps the fixture-stage constraint
# solve satisfiable. The real library can vary profiles freely — nothing
# in the assembler assumes this.
#
# Glyphs: "." walkable, "#" impassable, "P" walkable + can host a logical node.
# `walkable_tiles` is omitted throughout and inferred from the grid; the
# loader re-derives and compares either way, so an inferred spec is exactly
# as validated as a declared one.

# --- 4 open edges (crossroads) ---------------------------------------

[[chunks]]
id = "common:cross"
biome_tag = "common"
scale = "wilderness"
poi_slot = false
rows = [
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "................",
  "..#.............",
  ".............#..",
  "................",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
]
connectors = { north = { kind = "open" }, east = { kind = "open" }, south = { kind = "open" }, west = { kind = "open" } }

