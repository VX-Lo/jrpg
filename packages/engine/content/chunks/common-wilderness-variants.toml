# Additional non-POI wilderness variants, biome "common".
#
# WHY: the no-repeat rule (Gate 7) forbids reusing a chunk+orientation
# within a region, and a fully-constrained cell admits exactly one
# open-edge pattern. With one base chunk per pattern family there were only
# 2 variants for each tee/bend/dead-end pattern, which a 30-cell region
# exhausts. These bring every family to 8+ variants per pattern.
#
# The differences are decorative — a rock here, a widened verge there — but
# they are genuinely different tile grids, not relabelled copies, so
# no-repeat means something to a player looking at the terrain.
#
# Same convention: open edges are walkable at offsets 6-9.

# --- tees (N, E, S open) ----------------------------------------------

[[chunks]]
id = "common:tee-2"
biome_tag = "common"
scale = "wilderness"
poi_slot = false
rows = [
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "######....#.....",
  "######..........",
  "######........#.",
  "######..........",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
  "######....######",
]
connectors = { north = { kind = "open" }, east = { kind = "open" }, south = { kind = "open" }, west = { kind = "wall" } }

