# Fen wilderness chunks — biome "fen".
#
# The Fen and Cinderreach were chosen as the second and third biomes on
# purpose: Phase 2's Gate 6 spot-check found them the most distinct pair in
# the kernel set (wetland vs forge-town), so a blend between them is the
# strongest available test of whether the interpolation mechanism does
# anything real.
#
# FEN CHARACTER: organic and wet. Passages widen and narrow irregularly,
# scattered pools sit inside otherwise-open marsh, and nothing is square.
# Read against cinder-wilderness.toml, which is deliberately all right
# angles — that contrast is the point.
#
# These are ADDITIVE to the common pool, not a replacement, so they need
# not cover all 16 open-edge patterns; assembly unions a kernel's own
# biome with common and prefers the kernel's own (see assemble.ts).
#
# Same convention as every other file: open edges are walkable at 6-9.

