# Cinderreach wilderness chunks — biome "cinderreach".
#
# CINDERREACH CHARACTER: built, not grown. Every impassable mass is a
# rectangle — kilns, slag yards, flue walls — and passages run in straight
# lines at right angles. Deliberately the visual opposite of
# fen-wilderness.toml's irregular pools and widening channels, because the
# blend strip between a Fen region and a Cinderreach region is what
# Deliverable 4's test actually exercises. If these two read the same,
# the blend proves nothing.
#
# Additive to the common pool. Open edges are walkable at 6-9.

